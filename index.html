<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silent Classroom Animation</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #1a1a1a;
}

/* Scene background */
#scene {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: url('https://i.ibb.co/8D3rY7x/rainy-classroom.jpg') no-repeat center center;
  background-size: cover;
}

/* Students as images */
.student {
  position: absolute;
  width: 80px;
  height: 160px;
  border-radius: 10px;
  cursor: default;
  transition: transform 0.5s;
}

/* Detective highlight */
.detective {
  border: 3px solid yellow;
}

/* Desk */
#desk {
  position: absolute;
  bottom: 0;
  left: 25%;
  width: 500px;
  height: 60px;
  background: #3e2723;
  border-radius: 10px;
  opacity: 0;
  animation: deskFade 2s forwards;
  animation-delay: 1s;
}

@keyframes deskFade {
  0% {opacity:0;}
  100% {opacity:1;}
}

/* Shadow fade-in */
#detectiveShadow {
  position: absolute;
  bottom: 0;
  left: 30%;
  width: 100px;
  height: 200px;
  background: rgba(0,0,0,0.8);
  border-radius: 20px;
  transform: scaleX(-1);
  opacity: 0;
  animation: fadeInShadow 3s forwards;
}

#killerShadow {
  position: absolute;
  bottom: 0;
  right: 30%;
  width: 100px;
  height: 200px;
  background: rgba(0,0,0,0.8);
  border-radius: 20px;
  opacity: 0;
  animation: revealKiller 3s forwards;
  animation-delay: 4s;
}

@keyframes fadeInShadow {
  0% {opacity:0; transform: translateY(50px);}
  100% {opacity:1; transform: translateY(0);}
}

@keyframes revealKiller {
  0% {opacity:0; transform: translateY(50px);}
  100% {opacity:1; transform: translateY(0);}
}

/* Dialogue box */
#dialogue {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 20px;
  border-radius: 10px;
  width: 60%;
  text-align: center;
  font-size: 1.2em;
  display: none;
}
</style>
</head>
<body>

<div id="scene">

  <!-- Desk -->
  <div id="desk"></div>

  <!-- Shadows for suspense -->
  <div id="detectiveShadow"></div>
  <div id="killerShadow"></div>

  <!-- Students as human images (replace URLs with your images) -->
  <img src="https://i.ibb.co/0Fz3s2K/boy1.png" class="student detective" style="bottom:0; left:30%;" id="boy1">
  <img src="https://i.ibb.co/0Fz3s2K/boy2.png" class="student" style="bottom:0; left:15%;">
  <img src="https://i.ibb.co/0Fz3s2K/boy3.png" class="student" style="bottom:0; left:20%;">
  <img src="https://i.ibb.co/0Fz3s2K/boy4.png" class="student" style="bottom:0; left:25%;">
  <img src="https://i.ibb.co/0Fz3s2K/boy5.png" class="student" style="bottom:0; left:35%;">
  <img src="https://i.ibb.co/0Fz3s2K/boy7.png" class="student" style="bottom:0; left:60%;" id="boy7">
  <img src="https://i.ibb.co/0Fz3s2K/girl1.png" class="student" style="bottom:0; left:10%;">
  <img src="https://i.ibb.co/0Fz3s2K/girl2.png" class="student" style="bottom:0; left:20%;">
  <img src="https://i.ibb.co/0Fz3s2K/girl3.png" class="student" style="bottom:0; left:30%;">
  <img src="https://i.ibb.co/0Fz3s2K/girl4.png" class="student" style="bottom:0; left:40%;">
</div>

<div id="dialogue"></div>

<script>
const dialogue = document.getElementById('dialogue');
const boy1 = document.getElementById('boy1');
const boy7 = document.getElementById('boy7');
const detectiveShadow = document.getElementById('detectiveShadow');
const killerShadow = document.getElementById('killerShadow');

// Dialogue sequence
const lines = [
  "Detective boy1 enters the room silently...",
  "He places both hands on the desk, shadowed by the dim light.",
  "A figure appears on the other side, mysterious at first...",
  "The shadow reveals itself... it’s boy7! The culprit!"
];

let index = 0;
function showDialogue() {
  if(index < lines.length) {
    dialogue.style.display = 'block';
    dialogue.innerText = lines[index];
    index++;
    setTimeout(() => {
      dialogue.style.display = 'none';
      setTimeout(showDialogue, 2000);
    }, 4000);
  } else {
    // Replace shadows with images
    detectiveShadow.style.display = 'none';
    killerShadow.style.display = 'none';
    // Animate hands on desk
    boy1.style.transform = "translateY(-10px)";
    boy7.style.transform = "translateY(-5px)";
  }
}

setTimeout(showDialogue, 3000);
</script>

</body>
</html>
