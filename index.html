<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Murder Mystery</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #1a1a1a;
}

#scene {
  position: relative;
  width: 100vw;
  height: 100vh;
  background: url('https://i.ibb.co/8D3rY7x/rainy-classroom.jpg') no-repeat center center;
  background-size: cover;
}

/* Students as clickable images */
.student {
  position: absolute;
  width: 80px;
  height: 160px;
  border-radius: 10px;
  cursor: pointer;
  transition: transform 0.3s;
}

.student:hover {
  transform: scale(1.1);
}

.detective {
  border: 3px solid yellow;
}

/* Dialogue box for alibis or story */
#dialogue {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.8);
  color: white;
  padding: 20px;
  border-radius: 10px;
  width: 70%;
  text-align: center;
  font-size: 1.1em;
  display: none;
}

/* Desk for detective scene */
#desk {
  position: absolute;
  bottom: 0;
  left: 25%;
  width: 500px;
  height: 60px;
  background: #3e2723;
  border-radius: 10px;
}

</style>
</head>
<body>

<div id="scene">
  <!-- Desk -->
  <div id="desk"></div>

  <!-- Students (replace URLs with actual images) -->
  <img src="https://i.ibb.co/0Fz3s2K/boy1.png" class="student detective" style="bottom:0; left:10%;" id="boy1">
  <img src="https://i.ibb.co/0Fz3s2K/boy2.png" class="student" style="bottom:0; left:20%;" id="boy2">
  <img src="https://i.ibb.co/0Fz3s2K/boy3.png" class="student" style="bottom:0; left:30%;" id="boy3">
  <img src="https://i.ibb.co/0Fz3s2K/boy4.png" class="student" style="bottom:0; left:40%;" id="boy4">
  <img src="https://i.ibb.co/0Fz3s2K/boy5.png" class="student" style="bottom:0; left:50%;" id="boy5">
  <img src="https://i.ibb.co/0Fz3s2K/boy6.png" class="student" style="bottom:0; left:60%;" id="boy6">
  <img src="https://i.ibb.co/0Fz3s2K/boy7.png" class="student" style="bottom:0; left:70%;" id="boy7">
  
  <img src="https://i.ibb.co/0Fz3s2K/girl1.png" class="student" style="bottom:0; left:15%;" id="girl1">
  <img src="https://i.ibb.co/0Fz3s2K/girl2.png" class="student" style="bottom:0; left:25%;" id="girl2">
  <img src="https://i.ibb.co/0Fz3s2K/girl3.png" class="student" style="bottom:0; left:35%;" id="girl3">
  <img src="https://i.ibb.co/0Fz3s2K/girl4.png" class="student" style="bottom:0; left:45%;" id="girl4">
  <img src="https://i.ibb.co/0Fz3s2K/girl5.png" class="student" style="bottom:0; left:55%;" id="girl5">
  <img src="https://i.ibb.co/0Fz3s2K/girl6.png" class="student" style="bottom:0; left:65%;" id="girl6">
</div>

<div id="dialogue"></div>

<script>
// Alibis for each student
const alibis = {
  "boy1": "Detective boy1 was investigating the office.",
  "boy2": "boy2 was in the library at the time of the incident.",
  "boy3": "boy3 was attending a chemistry class.",
  "boy4": "boy4 was in the cafeteria.",
  "boy5": "boy5 was in gym class.",
  "boy6": "boy6 was talking to the janitor in the hallway.",
  "boy7": "boy7 has no one to back his alibi. Suspicious!",
  "girl1": "girl1 was in the library with boy2.",
  "girl2": "girl2 was in the art room.",
  "girl3": "girl3 was in computer lab.",
  "girl4": "girl4 was in the cafeteria.",
  "girl5": "girl5 was helping a teacher in another classroom.",
  "girl6": "girl6 was practicing music in the music room."
};

const dialogueBox = document.getElementById('dialogue');

// Make all students clickable
document.querySelectorAll('.student').forEach(student => {
  student.addEventListener('click', () => {
    const id = student.id;
    dialogueBox.innerText = alibis[id];
    dialogueBox.style.display = 'block';
    // Special effect if boy7 clicked
    if(id === "boy7") {
      dialogueBox.style.background = "rgba(255,0,0,0.8)";
    } else {
      dialogueBox.style.background = "rgba(0,0,0,0.8)";
    }
    setTimeout(() => {
      dialogueBox.style.display = 'none';
    }, 4000);
  });
});
</script>

</body>
</html>
