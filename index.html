<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deadly Despair in the Rain</title>
<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  overflow: hidden;
  cursor: none;
}

#crosshair {
  position: absolute;
  width: 20px;
  height: 20px;
  border: 2px solid white;
  border-radius: 50%;
  pointer-events: none;
  z-index: 5;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 4;
}

#dialogue {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: rgba(0,0,0,0.8);
  padding: 15px;
  z-index: 4;
}

.statement {
  position: absolute;
  padding: 10px;
  border: 1px solid white;
  background: rgba(0,0,0,0.6);
}
</style>
</head>
<body>

<div id="crosshair"></div>
<div id="ui"></div>
<div id="dialogue"></div>

<script>
const crosshair = document.getElementById("crosshair");
const ui = document.getElementById("ui");
const dialogue = document.getElementById("dialogue");

let health = 5;
let score = 0;
let phase = "story";

// Characters
const characters = [
  {name:"Aiko", line:"I stayed in the hall..."},
  {name:"Ren", line:"I heard something strange."},
  {name:"Mika", line:"This makes no sense..."}
];

// Follow mouse
document.addEventListener("mousemove", e => {
  crosshair.style.left = e.clientX - 10 + "px";
  crosshair.style.top = e.clientY - 10 + "px";
});

function updateUI(){
  ui.innerHTML = `Health: ${health} | Score: ${score}`;
}

// STORY MODE
let storyIndex = 0;
const storyLines = [
  "Rain pours outside the mansion...",
  "30 guests gather inside...",
  "A maid is found dead...",
  "The detective steps forward...",
  "A deadly trial begins..."
];

function nextStory(){
  if(storyIndex < storyLines.length){
    dialogue.innerText = storyLines[storyIndex];
    storyIndex++;
  } else {
    startDebate();
  }
}

document.addEventListener("click", ()=>{
  if(phase === "story") nextStory();
});

// DEBATE MODE
const statements = [
  {text:"I never left the room!", lie:true},
  {text:"I heard the scream.", lie:false},
  {text:"The maid was alive.", lie:false},
  {text:"No one moved.", lie:true}
];

function startDebate(){
  phase = "debate";
  dialogue.innerText = "Shoot the lies!";
  updateUI();

  statements.forEach(s=>{
    const div = document.createElement("div");
    div.className = "statement";
    div.innerText = s.text;
    div.style.left = Math.random()*window.innerWidth+"px";
    div.style.top = Math.random()*window.innerHeight+"px";

    div.onclick = ()=>shoot(div,s);
    document.body.appendChild(div);
  });

  setTimeout(startVote, 20000);
}

function shoot(div,s){
  if(s.lie){
    div.innerText = "THAT'S WRONG!";
    score++;
  } else {
    div.innerText = "MISS";
    health--;
  }

  updateUI();

  if(health<=0){
    gameOver();
  }

  setTimeout(()=>div.remove(),500);
}

function startVote(){
  phase = "vote";
  document.body.innerHTML = "<h1>Vote the killer</h1>";

  ["Aiko","Ren","Mika"].forEach(name=>{
    const b=document.createElement("button");
    b.innerText=name;
    b.onclick=()=>choose(name);
    document.body.appendChild(b);
  });
}

function choose(name){
  if(name==="Ren"){
    document.body.innerHTML="<h1>You solved it!</h1>";
  } else {
    document.body.innerHTML="<h1>Wrong... despair wins.</h1>";
  }
}

function gameOver(){
  document.body.innerHTML="<h1>GAME OVER</h1>";
}

// Start story
nextStory();
</script>

</body>
</html>
